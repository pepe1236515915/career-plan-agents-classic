analyze_profile_task:
  description: >
    วิเคราะห์โปรไฟล์ผู้เรียน: {learner_profile}
    สำหรับอาชีพเป้าหมายคือ {target_career}
    ระบุจุดแข็ง จุดอ่อน และประเด็นสำคัญเกี่ยวกับความพร้อมในการทำงาน
  expected_output: >
    บทสรุปที่มีโครงสร้างชัดเจนเกี่ยวกับโปรไฟล์ผู้เรียน จุดแข็ง จุดอ่อน 
    และประเด็นความพร้อมในการทำงาน โดยต้องเขียนเป็นภาษาไทยเท่านั้น
  agent: career_profile_analyst

analyze_gap_task:
  description: >
    เปรียบเทียบผลการประเมินตนเองปัจจุบันของผู้เรียน: {self_assessment}
    กับคุณสมบัติที่ต้องการ: {required_qualifications}
    รวมถึงอ้างอิงผลการวิเคราะห์โปรไฟล์จากขั้นตอนก่อนหน้า
    เพื่อระบุช่องว่างของทักษะ (competency gaps) และประเด็นที่ต้องให้ความสำคัญ
  expected_output: >
    ตารางวิเคราะห์ช่องว่างทักษะที่แสดงคุณสมบัติที่ต้องการ, ระดับปัจจุบัน, 
    ระดับเป้าหมาย, ระดับความห่าง (Gap level), และลำดับความสำคัญ โดยต้องเขียนเป็นภาษาไทยเท่านั้น
  agent: qualification_gap_analyst
  context:
    - analyze_profile_task

create_development_plan_task:
  description: >
    สร้างแผนการพัฒนาอาชีพส่วนบุคคลสำหรับอาชีพ {target_career}
    โดยอิงจากโปรไฟล์ผู้เรียน ช่องว่างของทักษะ และลำดับความสำคัญในการพัฒนา
    ที่ได้จากขั้นตอนก่อนหน้า
  expected_output: >
    แผนการพัฒนาที่นำไปใช้ได้จริง ประกอบด้วย เป้าหมายการพัฒนา, กิจกรรม, 
    ช่องทางการเรียนรู้, ระยะเวลา, หลักฐานการประเมิน, และผลลัพธ์ที่คาดหวัง โดยต้องเขียนเป็นภาษาไทยเท่านั้น
  agent: development_plan_designer
  context:
    - analyze_profile_task
    - analyze_gap_task

write_final_report_task:
  description: >
    เขียนรายงานฉบับสมบูรณ์เพื่อสรุปการวิเคราะห์อาชีพ การวิเคราะห์ช่องว่างของทักษะ 
    คำแนะนำจากการประเมินตนเอง และแผนการพัฒนาส่วนบุคคล โดยรวบรวมผลลัพธ์
    จากทุกขั้นตอนก่อนหน้าให้เป็นเอกสารเดียวที่อ่านง่ายและครบถ้วน
  expected_output: >
    รายงานฉบับสมบูรณ์ที่ประกอบด้วยหัวข้อ: โปรไฟล์ผู้เรียน, อาชีพเป้าหมาย, 
    คุณสมบัติที่ต้องการ, การวิเคราะห์ช่องว่างทักษะ, แผนการพัฒนา และคำแนะนำ โดยต้องเขียนเป็นภาษาไทยเท่านั้น
  agent: self_assessment_coach
  context:
    - analyze_profile_task
    - analyze_gap_task
    - create_development_plan_task